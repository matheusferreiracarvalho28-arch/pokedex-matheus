<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="server.js"></script>
    <title>pokedex</title>
  </head>

  <body>
    <form action="http://localhost:8080/cartas/nova" method="post">
      <label>nome</label>
      <input type="text" name="nome" id="" />

      <label>expanção</label>
      <input type="text" name="expansao" id="" />

      <label>hp</label>
      <input type="text" name="hp" id="" />

      <button type="submit">enviar</button>
    </form>

    <form id="form">
      <label>Buscar:</label>
      <input type="number" />
      <button type="submit">achar</button>
    </form>

    <script>
      const formulario = document.getElementById("form");

      formulario.addEventListener("submit", function (event) {

        event.preventDefault();
        
        fetch("http://localhost:8080/cartas")
          .then(res => res.json())
          .then(dados => {
            console.log("Dados adiconados ao servidor,e eles são ", dados);
          })
          .catch(erro => {
            console.error("DEU ERRO", erro);
          });
      });
    </script>

  </body>
</html>
